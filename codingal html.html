<html>
<head>
<title>Lists</title>
</head>
<body>
<h2>An ordered HTML list:</h2>
<ol>
<li>First term</li>
<li>Second term</li>
<li>Third term</li>
<li>Fourth term</li>
<li>Fifth term</li>
</ol>
<h2>An unordered HTML list:</h2>
<ul>
<li>Item</li>
<li>Item</li>
<li>Item</li>
<li>Item</li>
<li>Item</li>
</ul>
<h2>Definition list:</h2>
<dl> 
<dt>Tea</dt>
<dd>Drink</dd>
</dl>
</body>
</html>

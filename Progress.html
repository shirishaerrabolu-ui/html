<html>
<head>
<title>Bootstrap Jomotron</title>

<link rel="stylesheet" href=

<script src=

"https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

</script>

<body>
<div class="container">

<h2>Basic Progress Bar</h2>
<p>To create a default Progress Bar,add a progress class to a container elementand
add the progress bar class to its child element. Use the CSS width property to
set the width of the progress bar.</p>
<div class="progress">
<div class="progress-bar" style="width: 70%;">70%

</div>

</div>
</body>
